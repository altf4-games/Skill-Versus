[build]
  base = "frontend"
  publish = "dist"
  command = "npm install && npm run build && cd ../backend && npm install"
  functions = "../backend/netlify/functions"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
